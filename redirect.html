<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREO — Connecting Account...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { creo: { purple: '#1a0a3e', mint: '#33f0b0' } } } }
    }
  </script>
  <style>
    .pulse-ring { animation: pulseRing 1.5s ease-out infinite; }
    @keyframes pulseRing { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
  </style>
</head>
<body class="bg-white text-gray-900 flex items-center justify-center min-h-screen text-center transition-colors duration-300">
  <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200 max-w-sm transition-colors">
    <!-- Logo -->
    <div class="mb-4">
      <div class="w-16 h-16 rounded-full bg-white flex items-center justify-center mx-auto"><img src="assets/logo-icon.png" alt="CREO" class="w-12 h-12 rounded-full object-contain"></div>
    </div>
    <h1 class="text-xl font-bold text-gray-900 mb-2">Syncing with Stripe</h1>
    <p class="text-gray-500 text-sm">Please hold on while we finalize your verification...</p>
    <p id="status-msg" class="mt-4 text-sm font-medium"></p>
    <div class="mt-4 flex justify-center">
      <div class="relative w-6 h-6">
        <div class="absolute inset-0 rounded-full bg-creo-mint opacity-30 pulse-ring"></div>
        <div class="absolute inset-1 rounded-full bg-creo-mint"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status');
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const hasAuthToken = hashParams.get('access_token');

    if (hasAuthToken) {
      document.querySelector('h1').textContent = 'Iniciando sesión...';
      document.querySelector('p').textContent = 'Verificando tu cuenta de Google...';
      (async () => {
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
          let { data: profile } = await sb.from('profiles').select('id').eq('id', user.id).single();
          if (!profile) {
            const displayName = user.user_metadata?.full_name || user.email.split('@')[0];
            const username = 'user_' + Math.floor(Math.random() * 100000);
            await sb.from('profiles').insert([{ id: user.id, username, display_name: displayName, avatar_url: user.user_metadata?.avatar_url || null }]);
          }
          if (isAdmin(user.email)) {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          window.location.href = 'index.html';
        }
      })();
    } else if (status === 'success') {
      document.getElementById('status-msg').innerText = "Stripe Account Verified! Redirecting...";
      document.getElementById('status-msg').classList.add('text-green-600');
      setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    } else if (status === 'refresh') {
      document.getElementById('status-msg').innerText = "Onboarding incomplete. Redirecting to retry...";
      document.getElementById('status-msg').classList.add('text-yellow-600');
      setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    } else {
      setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    }
  </script>
</body>
</html>
